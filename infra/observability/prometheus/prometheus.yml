global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://api:3001/api/health/live
        labels:
          endpoint: api-live
          service: api
      - targets:
          - http://api:3001/api/health/ready
        labels:
          endpoint: api-ready
          service: api
      - targets:
          - http://web:3000
        labels:
          endpoint: web-home
          service: web
      - targets:
          - http://nginx/nginx-health
        labels:
          endpoint: nginx-health
          service: nginx
      - targets:
          - http://minio:9000/minio/health/live
        labels:
          endpoint: minio-live
          service: minio
      - targets:
          - http://icecast:8000/
        labels:
          endpoint: icecast-root
          service: icecast
      - targets:
          - http://icecast:8000/status-json.xsl
        labels:
          endpoint: icecast-status
          service: icecast
      - targets:
          - http://icecast:8000/live.mp3
        labels:
          endpoint: stream-mount
          service: icecast
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
